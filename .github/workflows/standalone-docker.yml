name: 'release standalone docker'
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'The git branch to build.'
        required: true
        default: 'my_dev'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-latest
#          - platform: linux/arm64
#            os: ubuntu-24.04-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.branch }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./web-ui

      - name: Install npm
        working-directory: ./web-ui
        run: npm ci

      - name: Set platform key
        run: echo "PLATFORM_KEY=$(echo ${{ matrix.platform }} | tr '/' '-')" >> $GITHUB_ENV

      - name: Cache web UI build
        id: cache-web
        uses: actions/cache@v4 # 升级到 v4
        with:
          path: ./src/main/resources/static
          # 移除 PLATFORM_KEY，跨平台共享 Web 缓存
          key: web-${{ hashFiles('web-ui/src/**', 'web-ui/package.json') }}

      - name: Build web UI
        if: steps.cache-web.outputs.cache-hit != 'true'
        working-directory: ./web-ui
        run: npm run build

      - name: Cache native binary
        id: cache-native
        uses: actions/cache@v3
        with:
          path: target/atv
          key: native-${{ env.PLATFORM_KEY }}-${{ hashFiles('src/**', 'pom.xml') }}

      - name: Install Native Toolchain Dependencies
        if: matrix.platform == 'linux/arm64' && steps.cache-native.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libz-dev zlib1g-dev

      - name: Setup GraalVM
        if: steps.cache-native.outputs.cache-hit != 'true'
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          native-image-musl: ${{ matrix.platform == 'linux/amd64' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven' # 使用内置缓存，删除下面的手动 Maven 缓存步骤

      - name: Build native with Maven
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: |
          if [ "${{ matrix.platform }}" = "linux/arm64" ]; then
            # 移除可能冲突的 musl 强制配置，使用 aarch64 原生工具链
            mvn -B -Pnative package --file pom.xml \
              -Dnative.buildArgs="--enable-http --enable-https -march=compatibility -Dorg.sqlite.lib.exportPath=$(pwd)/target"
          else
            # amd64 维持原样
            mvn -B -Pnative package --file pom.xml
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set APP version
        run: |
          mkdir -p data
          export TZ=Asia/Shanghai
          num1=$(date +%Y)
          num2=$(date +%j)
          sum=$((($num1 - 2023) * 366 + $num2))
          echo $sum.$(date +%H%M)-dev > data/version
          echo ${{ github.event.head_commit.message }} >> data/version
          cp data/version data/app_version
          cat data/version

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile-standalone
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=ghcr.io/${{ env.OWNER }}/alist-tvbox,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.os }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Create manifest and push
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ env.OWNER }}/alist-tvbox:standalone \
            $(printf 'ghcr.io/${{ env.OWNER }}/alist-tvbox@sha256:%s ' *)
        working-directory: /tmp/digests